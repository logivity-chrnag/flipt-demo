version: "1.5"
namespace:
    key: default
    name: Default
flags:
    - key: new-create-shipment-flow
      name: New create shipment flow
      type: BOOLEAN_FLAG_TYPE
      enabled: false
      rollouts:
        - segment:
            keys:
                - beta-users
            operator: OR_SEGMENT_OPERATOR
            value: true
    - key: new-flag
      name: New flag
      type: BOOLEAN_FLAG_TYPE
      enabled: false
    - key: show-invoice-upload
      name: Show invoice upload
      type: BOOLEAN_FLAG_TYPE
      enabled: false
      rollouts:
        - segment:
            keys:
                - beta-users
            operator: OR_SEGMENT_OPERATOR
            value: true
segments:
    - key: all-users
      name: All users
      match_type: ANY_MATCH_TYPE
    - key: beta-users
      name: Beta users
      constraints:
        - type: STRING_COMPARISON_TYPE
          property: orgId
          operator: isoneof
          value: '["org1","org2","org3"]'
      match_type: ANY_MATCH_TYPE
