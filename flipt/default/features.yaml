version: "1.5"
namespace:
    key: default
    name: Default
flags:
    - key: new-create-shipment-flow
      name: New create shipment flow
      type: BOOLEAN_FLAG_TYPE
      enabled: false
segments:
    - key: all-users
      name: All users
      match_type: ANY_MATCH_TYPE
    - key: beta-users
      name: Beta users
      constraints:
        - type: STRING_COMPARISON_TYPE
          property: orgId
          operator: isoneof
          value: '["org1","org2"]'
      match_type: ANY_MATCH_TYPE
